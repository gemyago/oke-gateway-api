apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: oke-gateway
spec:
  gatewayClassName: oke-gateway-api
  infrastructure:
    parametersRef:
      group: oke-gateway-api.gemyago.github.io
      kind: GatewayConfig
      name: oke-gateway-config
  allowedListeners:
    namespaces:
      from: Same
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: oke-gateway-extra-http
spec:
  parentRef:
    name: oke-gateway
  listeners:
    - name: api
      protocol: HTTP
      port: 8080
      hostname: api.example.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: listener-set-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: oke-gateway-extra-http
      sectionName: api
  hostnames:
    - api.example.com
  rules:
    - backendRefs:
        - name: oke-gateway-example-server
          port: 8080
