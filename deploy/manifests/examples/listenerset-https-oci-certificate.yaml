apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-alb
spec:
  gatewayClassName: oke-gateway-api
  infrastructure:
    parametersRef:
      group: oke-gateway-api.gemyago.github.io
      kind: GatewayConfig
      name: oke-gateway-config
  allowedListeners:
    namespaces:
      from: Same
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: api-https-oci-cert
spec:
  parentRef:
    name: shared-alb
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: api.example.com
      tls:
        mode: Terminate
        options:
          oci.oraclecloud.com/certificate-ocid: ocid1.certificate.oc1..exampleuniqueID
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: api-https-oci-cert
      sectionName: https
  hostnames:
    - api.example.com
  rules:
    - backendRefs:
        - name: oke-gateway-example-server
          port: 8080
