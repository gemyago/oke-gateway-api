---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-alb
spec:
  gatewayClassName: oke-gateway-api
  infrastructure:
    parametersRef:
      group: oke-gateway-api.gemyago.github.io
      kind: GatewayConfig
      name: oke-gateway-config
  allowedListeners:
    namespaces:
      from: Same
  tls:
    frontend:
      default: {}
      perPort:
        - port: 8443
          tls:
            validation:
              caCertificateRefs:
                - group: ""
                  kind: ConfigMap
                  name: api-client-ca-bundle
              mode: AllowValidOnly
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: mtls-api
spec:
  parentRef:
    name: shared-alb
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: api.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: oke-gw-example-https-cert
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mtls-api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: mtls-api
      sectionName: https
  hostnames:
    - api.example.com
  rules:
    - backendRefs:
        - name: oke-gateway-example-server
          port: 8080
